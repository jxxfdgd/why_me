{% extends 'base.html' %}

{% block content %}
<!-- Confetti library for the endgame screen -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<div class="dashboard-header" style="margin-bottom: 1rem;">
    <h2>{{ game.title }}</h2>
    <a href="{% url 'home' %}" class="btn" style="background: rgba(255,255,255,0.1);">Exit Game</a>
</div>

<div class="play-layout" id="game-app" data-game-id="{{ game.id }}">
    <style>
        .container { max-width: 98% !important; padding: 1rem !important; }
        .sidebar {
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55), opacity 0.6s;
        }
        .sidebar.hide-left {
            transform: translateX(-150%);
            opacity: 0;
        }
        .sidebar.hide-right {
            transform: translateX(150%);
            opacity: 0;
        }
    </style>
    <!-- Team 2 Sidebar -->
    <div class="sidebar glass-panel" id="sidebar-t2" style="position: relative; z-index: 1001; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 200px;">
        <h3 class="team-name" id="team2-name" contenteditable="true" style="margin-bottom: 2rem;">Team 2</h3>
        <div class="score-display" id="team2-score" style="margin-bottom: 2rem;">0</div>
        
        <button class="btn btn-primary" onclick="app.adjustScore(2, 100)" style="width: 100%; margin-bottom: 1rem;">+100</button>
        <button class="btn btn-primary" onclick="app.adjustScore(2, -100)" style="width: 100%;">-100</button>
    </div>

    <!-- Center Board -->
    <div class="center-board">
        <div id="loading" style="text-align: center; padding: 2rem;">Loading game board...</div>
        <div class="jeopardy-grid" id="jeopardy-grid" style="display: none;">
            <!-- Rendered via JS -->
        </div>
    </div>

    <!-- Team 1 Sidebar -->
    <div class="sidebar glass-panel" id="sidebar-t1" style="position: relative; z-index: 1001; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 200px;">
        <h3 class="team-name" id="team1-name" contenteditable="true" style="margin-bottom: 2rem;">Team 1</h3>
        <div class="score-display" id="team1-score" style="margin-bottom: 2rem;">0</div>
        
        <button class="btn btn-primary" onclick="app.adjustScore(1, 100)" style="width: 100%; margin-bottom: 1rem;">+100</button>
        <button class="btn btn-primary" onclick="app.adjustScore(1, -100)" style="width: 100%;">-100</button>
    </div>
</div>

<!-- Question Modal -->
<div class="modal-overlay" id="question-modal">
    <div class="modal-content">
        <div class="modal-timer" id="modal-timer">30</div>
        <div class="modal-question" id="modal-question-text">Question goes here</div>
        <div id="modal-hint-text" class="modal-hint-box"></div>
        
        <div style="margin-top: 3rem; display: grid; grid-template-columns: 1fr 1fr; gap: 2rem;">
            <!-- Left: Team Awards -->
            <div class="glass-panel" style="padding: 1.5rem; border-color: #06b6d4; background: rgba(6, 182, 212, 0.05); display: flex; flex-direction: column;">
                <h4 style="margin-bottom: 1rem; color: #06b6d4; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px;">Award Points</h4>
                <div style="display: flex; flex-direction: column; gap: 1rem; flex-grow: 1; justify-content: center;">
                    <button class="btn btn-primary" id="btn-award-t1" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Award Team 1</button>
                    <button class="btn btn-primary" id="btn-award-t2" style="width: 100%; font-size: 1.1rem; padding: 1rem;">Award Team 2</button>
                </div>
            </div>

            <!-- Right: Game Controls -->
            <div class="glass-panel" style="padding: 1.5rem; border-color: var(--accent-purple); background: rgba(139, 92, 246, 0.05); display: flex; flex-direction: column;">
                <h4 style="margin-bottom: 1rem; color: var(--accent-purple); text-transform: uppercase; font-size: 0.9rem; letter-spacing: 2px;">Game Controls</h4>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; flex-grow: 1;">
                    <!-- Actions -->
                    <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                        <button class="btn" id="btn-show-hint" style="background: var(--accent-purple);">Show Hint</button>
                        <button class="btn" id="btn-show-answer" style="background: rgba(255,255,255,0.1);">Show Answer</button>
                        <button class="btn" id="btn-no-winner" style="background: var(--accent-pink);">No Winner</button>
                    </div>
                    <!-- Abilities -->
                    <div style="display: flex; flex-direction: column; gap: 0.5rem; border-left: 1px solid rgba(255,255,255,0.1); padding-left: 1rem;">
                        <span style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase;">Team 1 Abilities</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn" id="btn-ability-t1-2x" style="background: rgba(6, 182, 212, 0.2); border: 1px solid #06b6d4; font-size: 0.8rem; padding: 0.5rem;">2x Pts</button>
                            <button class="btn" id="btn-ability-t1-hint" style="background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; font-size: 0.8rem; padding: 0.5rem;">Free Hint</button>
                        </div>
                        <span style="font-size: 0.8rem; color: var(--text-secondary); text-transform: uppercase; margin-top: 0.5rem;">Team 2 Abilities</span>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn" id="btn-ability-t2-2x" style="background: rgba(6, 182, 212, 0.2); border: 1px solid #06b6d4; font-size: 0.8rem; padding: 0.5rem;">2x Pts</button>
                            <button class="btn" id="btn-ability-t2-hint" style="background: rgba(16, 185, 129, 0.2); border: 1px solid #10b981; font-size: 0.8rem; padding: 0.5rem;">Free Hint</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="modal-answer-box" style="display: none; margin-top: 2rem; padding: 1rem; border: 1px solid #10b981; border-radius: 8px; background: rgba(16, 185, 129, 0.1);">
            Answer: <span id="modal-answer-text"></span>
        </div>
    </div>
</div>

{% load static %}
<script src="{% static 'js/game.js' %}"></script>
{% endblock %}
