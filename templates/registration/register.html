{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="glass-panel">
        <h2 style="margin-bottom: 2rem; text-align: center;">Join TriviaMaster</h2>
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small style="color: var(--text-secondary); display: block; margin-top: 0.5rem;">{{ field.help_text }}</small>
                    {% endif %}
                    {% for error in field.errors %}
                        <small style="color: var(--accent-pink); display: block; margin-top: 0.5rem;">{{ error }}</small>
                    {% endfor %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-blue);">Login</a>
        </p>
    </div>
</div>
{% endblock %}
