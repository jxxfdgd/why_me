{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="glass-panel">
        <h2 style="margin-bottom: 2rem; text-align: center;">Welcome Back</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" class="form-control" required id="id_username">
            </div>
            <div class="form-group" style="position: relative;">
                <label for="id_password">Password</label>
                <input type="password" name="password" class="form-control" required id="id_password" style="padding-right: 40px;">
                <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 38px; background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 1.2rem;">👁️</button>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
            Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-blue);">Register</a>
        </p>
    </div>
</div>

<script>
    document.getElementById('togglePassword').addEventListener('click', function (e) {
        const password = document.getElementById('id_password');
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        this.innerText = type === 'password' ? '👁️' : '🙈';
    });
</script>
{% endblock %}
